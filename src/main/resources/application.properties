spring.application.name=DeCasa

# -----------------------------------------------
# DataSource — MySQL via Docker
# -----------------------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/decasa?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=decasa
spring.datasource.password=decasa
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# -----------------------------------------------
# JPA / Hibernate
# -----------------------------------------------
# none: el schema ya lo crean los scripts SQL del contenedor Docker.
# Hibernate solo mapea entidades — no toca la BD.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# -----------------------------------------------
# Flyway — desactivado
# -----------------------------------------------
spring.flyway.enabled=false

# -----------------------------------------------
# Seguridad — Admin y JWT
# -----------------------------------------------
app.admin.username=admin@decasa.be
app.admin.password=admin123

app.jwt.secret=decasa-super-secret-key-cambiame-en-produccion-32chars
app.jwt.expiration-ms=86400000
